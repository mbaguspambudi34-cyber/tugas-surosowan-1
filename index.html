<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Link Page - Muhammad Bagus Pambudi</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #38bdf8, #6366f1, #9333ea);
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-color: #1f2937;
      --button-bg: #111827;
      --button-text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    body.dark {
      --bg-gradient: linear-gradient(135deg, #020617, #111827, #312e81);
      --card-bg: rgba(15, 23, 42, 0.92);
      --text-color: #f8fafc;
      --button-bg: #f8fafc;
      --button-text: #111827;
      --shadow: rgba(255, 255, 255, 0.15);
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: 0.4s;
    }

    main {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 40px var(--shadow);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.8s ease;
    }

    .toggle-wrapper {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    .toggle-btn {
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 14px;
      transition: 0.3s;
    }

    .toggle-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    header img {
      width: 125px;
      height: 125px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 10px 25px var(--shadow);
      margin-bottom: 18px;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    header p {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    nav a {
      text-decoration: none;
      background: var(--button-bg);
      color: var(--button-text);
      padding: 15px;
      border-radius: 14px;
      font-weight: bold;
      transition: 0.3s ease;
      box-shadow: 0 8px 18px var(--shadow);
    }

    nav a:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 14px 28px var(--shadow);
    }

    footer {
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.75;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 25px 18px;
      }

      header h1 {
        font-size: 24px;
      }

      header p {
        font-size: 14px;
      }

      nav a {
        padding: 14px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <div class="toggle-wrapper">
        <button class="toggle-btn" id="darkModeBtn">🌙 Dark Mode</button>
      </div>

      <header>
        <img 
          src="main/PROFIL-45.jpg" 
          alt="Foto Profil"
        />

        <h1>Muhammad Bagus Pambudi</h1>

        <p>
          Web Developer pemula yang sedang belajar HTML, CSS, JavaScript,
          dan Laravel. Saya suka membuat website sederhana, modern, dan responsif.
        </p>
      </header>

      <nav aria-label="Daftar link sosial media dan portofolio">
        <a href="https://www.instagram.com/baguspambudi05/" target="_blank">Instagram</a>
        <a href="https://github.com/mbaguspambudi34-cyber" target="_blank">GitHub</a>
        <a href="https://wa.me/6289515014503" target="_blank">WhatsApp</a>
      </nav>

      <footer>
        <p>© 2026 Muhammad Bagus Pambudi. Dibuat dengan HTML, CSS, dan JavaScript.</p>
      </footer>
    </section>
  </main>

  <script>
    const darkModeBtn = document.getElementById("darkModeBtn");

    darkModeBtn.addEventListener("click", function () {
      document.body.classList.toggle("dark");

      if (document.body.classList.contains("dark")) {
        darkModeBtn.textContent = "☀️ Light Mode";
      } else {
        darkModeBtn.textContent = "🌙 Dark Mode";
      }
    });
  </script>
</body>
</html>
